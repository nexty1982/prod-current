<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Orthodox Records — 3D Multilingual Gallery</title>
<style>
  :root{
    --bg:#0b0f1a;
    --card:#0f1630;
    --ink:#eaf2ff;
    --muted:#a9b4d0;
    --accent:#5a7dff;
    --gold:#e3c45a;
    --cyan:#5af3ff;
    --purple:#7a5cff;
  }
  html,body{height:100%;margin:0;background:radial-gradient(120% 120% at 50% 0%, #0f1530 0%, #0b0f1a 50%, #06070b 100%);color:var(--ink);font-family:Inter, 'Noto Sans', 'Noto Sans Greek', 'Noto Sans JP', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;overflow:hidden}
  .hud{position:fixed;inset:16px auto auto 16px;z-index:99;background:rgba(10,14,24,.55);border:1px solid rgba(255,255,255,.08); padding:10px 12px;border-radius:12px;backdrop-filter:blur(8px);color:#dfe6ff; font-size:12px}
  .hud input{vertical-align:middle}
  .hud label{margin-right:12px}
  .scene{position:absolute; inset:0; display:grid; place-items:center; perspective:1200px; perspective-origin:50% 30%}
  .gallery{position:relative; width:1200px; max-width:94vw; height:600px; transform-style:preserve-3d}
  .ring{position:absolute; inset:0; transform-style:preserve-3d; animation: spin 28s linear infinite}
  .ring.paused{animation-play-state:paused}
  @keyframes spin{ from{ transform: translateZ(-520px) rotateY(0deg) } to{ transform: translateZ(-520px) rotateY(-360deg) } }
  .item{position:absolute; top:50%; left:50%; width:320px; height:460px; transform-style:preserve-3d; transition: transform .6s ease}
  .card{
    position:absolute; inset:0; background:linear-gradient(180deg, rgba(18,26,60,.92), rgba(14,18,34,.92));
    border-radius:18px; border:1px solid rgba(255,255,255,.08);
    box-shadow:0 30px 60px rgba(0,0,0,.45), inset 0 0 0 1px rgba(175,200,255,.04);
    overflow:hidden; transform:translateZ(10px);
    display:flex; flex-direction:column;
  }
  .badge{position:absolute; top:14px; right:14px; width:38px; height:38px; border-radius:12px; background:radial-gradient(120% 120% at 0% 0%, var(--gold), #f7e7a4); color:#5a4a00; display:grid; place-items:center; font-weight:900; box-shadow:0 8px 18px rgba(227,196,90,.35)}
  .badge::before{ content:"✝"; font-size:18px; transform:translateY(-1px)}
  .title{font-weight:900; font-size:20px; letter-spacing:.3px; color:#e8edff; margin:12px 16px 4px; text-shadow:0 1px 0 rgba(255,255,255,.08)}
  .subtitle{ margin:0 16px 8px; font-size:12px; color:var(--muted)}
  .fields{ display:grid; grid-template-columns:120px 1fr; gap:8px 10px; padding:8px 16px 16px; font-size:13px }
  .fields dt{ color:#a6b4df; font-weight:700 }
  .fields dd{ margin:0; color:#dde6ff }
  .shine{ position:absolute; inset:-40% -40%; background:linear-gradient(130deg, rgba(255,255,255,0) 42%, rgba(255,255,255,.20) 47%, rgba(255,255,255,0) 52%); transform:translateX(-60%) rotate(10deg); animation: shine 6s ease-in-out infinite; mix-blend-mode:overlay; pointer-events:none }
  @keyframes shine{ 0%{ transform:translateX(-60%) rotate(10deg) } 50%{ transform:translateX(60%) rotate(10deg) } 100%{ transform:translateX(160%) rotate(10deg) } }
  .reflection{ position:absolute; left:0; right:0; bottom:-470px; height:400px; transform:scaleY(-1) translateZ(0); filter:blur(1px) saturate(.9); opacity:.55; mask-image:linear-gradient(to bottom, rgba(0,0,0,.5), rgba(0,0,0,0)); -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,.5), rgba(0,0,0,0)) }
  .reflect-surface{ position:absolute; inset:auto 0 0 0; height:120px; background:linear-gradient(180deg, rgba(90,125,255,.05), rgba(0,0,0,.0)); border-top:1px solid rgba(255,255,255,.06); box-shadow:0 -10px 60px rgba(90,125,255,.18) }
  .particles{ position:absolute; inset:0; pointer-events:none }
  .dot{ position:absolute; width:2px; height:2px; background:radial-gradient(circle, #a5ddff, transparent 60%); border-radius:50%; opacity:.85; animation: drift linear infinite }
  @keyframes drift{ from{ transform: translateY(0) translateX(0); opacity: .9 } to{ transform: translateY(-180px) translateX(60px); opacity: .1 } }
  .controls{ position:fixed; inset:auto 0 24px 0; display:flex; justify-content:center; gap:12px; z-index:90 }
  .btn{ background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.2)); color:#e7eeff; border:1px solid rgba(255,255,255,.12); padding:10px 14px; border-radius:12px; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,.3); min-width:120px; font-weight:700 }
  .btn:hover{ border-color:var(--cyan); box-shadow:0 8px 22px rgba(90,243,255,.2) }
  .flag-banner{ display:flex; align-items:center; gap:12px; padding:12px 14px 8px 14px; border-bottom:1px solid rgba(255,255,255,.06); background:linear-gradient(180deg, rgba(40,60,110,.35), rgba(10,14,28,.0)) }
  .flag-title{ display:flex; flex-direction:column }
  .flag-title .label{ font-weight:900; letter-spacing:.4px; color:#eaf2ff }
  .flag-title .greek{ font-size:12px; color:#bfc8e6 }
  .snippet{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); margin:10px 14px 0; border-radius:12px; padding:10px 12px; font-family:"Fira Code","Consolas",monospace; color:#dfe7ff; font-size:12px; }
  .snippet .k{ color:#9cdcfe } .snippet .v{ color:#c3e88d }
</style>
</head>
<body>
  <div class="hud">
    <label><input type="checkbox" id="toggleSpin" checked /> Auto-rotate</label>
    <label><input type="range" id="speed" min="8" max="60" value="28" /> Speed</label>
  </div>

  <div class="scene">
    <div class="gallery">
      <div class="ring" id="ring"></div>
      <div class="reflect-surface"></div>
      <div class="particles" id="particles"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prev">◀ Prev</button>
    <button class="btn" id="next">Next ▶</button>
  </div>

<script>
// --- Inline SVG flags / badges ---
const Flags = {
  Greece: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="Greece">
      <rect width="64" height="42" fill="#0D5EAF"/>
      <g fill="#FFFFFF">
        <rect x="0" y="16" width="64" height="6"/>
        <rect x="0" y="28" width="64" height="6"/>
        <rect x="0" y="4" width="64" height="6"/>
        <rect x="0" y="40" width="64" height="2"/>
      </g>
      <g>
        <rect x="0" y="0" width="28" height="24" fill="#0D5EAF"/>
        <rect x="10" y="0" width="6" height="24" fill="#FFFFFF"/>
        <rect x="0" y="9" width="28" height="6" fill="#FFFFFF"/>
      </g>
    </svg>`,
  Russia: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="Russia">
      <rect width="64" height="14" y="0" fill="#FFFFFF"/>
      <rect width="64" height="14" y="14" fill="#0D5EAF"/>
      <rect width="64" height="14" y="28" fill="#CE1126"/>
    </svg>`,
  Romania: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="Romania">
      <rect width="21.33" height="42" x="0" fill="#002B7F"/>
      <rect width="21.33" height="42" x="21.33" fill="#FCD116"/>
      <rect width="21.33" height="42" x="42.66" fill="#CE1126"/>
    </svg>`,
  China: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="China">
      <rect width="64" height="42" fill="#DE2910"/>
      <circle cx="14" cy="14" r="6" fill="#FFDE00"/>
      <circle cx="26" cy="8" r="2" fill="#FFDE00"/>
      <circle cx="30" cy="14" r="2" fill="#FFDE00"/>
      <circle cx="28" cy="20" r="2" fill="#FFDE00"/>
      <circle cx="22" cy="22" r="2" fill="#FFDE00"/>
    </svg>`,
  Georgia: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="Georgia">
      <rect width="64" height="42" fill="#FFFFFF"/>
      <rect x="28" y="0" width="8" height="42" fill="#FF0000"/>
      <rect x="0" y="17" width="64" height="8" fill="#FF0000"/>
      <!-- 4 bolnur-katskhuri crosses simplified -->
      <rect x="8" y="8" width="8" height="8" fill="#FF0000"/>
      <rect x="48" y="8" width="8" height="8" fill="#FF0000"/>
      <rect x="8" y="26" width="8" height="8" fill="#FF0000"/>
      <rect x="48" y="26" width="8" height="8" fill="#FF0000"/>
    </svg>`,
  Vatican: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="Vatican (simplified)">
      <rect width="32" height="42" fill="#FFD700"/>
      <rect x="32" width="32" height="42" fill="#FFFFFF"/>
    </svg>`,
  Slavonic: () => `
    <svg width="64" height="42" viewBox="0 0 64 42" xmlns="http://www.w3.org/2000/svg" aria-label="Church Slavonic">
      <rect width="64" height="42" fill="#1d2a44"/>
      <text x="32" y="26" font-size="16" text-anchor="middle" fill="#e3c45a" font-family="serif">☦</text>
    </svg>`
};

// --- Card data ---
const ITEMS = [
  // Greek — Baptism
  {
    flag: 'Greece',
    label: 'Αρχεία Βαπτίσεων',
    sub: 'Baptism Records (Greek)',
    title: 'Βάπτιση',
    sample: [['Όνομα','Μαρία'],['Επώνυμο','Παπαδοπούλου'],['Ημ. Βάπτισης','1990-04-01'],['Ιερέας','Π. Νικόλαος Ιωάννου']],
    fields: [['Όνομα','Μαρία'],['Επώνυμο','Παπαδοπούλου'],['Ημ. Γέννησης','1990-03-14'],['Τόπος','Αθήνα']]
  },
  // Russian — Marriage
  {
    flag: 'Russia',
    label: 'Записи о Браке',
    sub: 'Marriage Records (Russian)',
    title: 'Бракосочетание',
    sample: [['Имя жениха','Александр'],['Имя невесты','Мария'],['Дата брака','2012-06-17'],['Священник','Пр. Николай Георгиев']],
    fields: [['Фамилия жениха','Иванов'],['Фамилия невесты','Петрова'],['Свидетели','Дмитрий Соколов']]
  },
  // Romanian — Funeral
  {
    flag: 'Romania',
    label: 'Registre de Înmormântări',
    sub: 'Funeral Records (Romanian)',
    title: 'Înmormântare',
    sample: [['Prenume','Ion'],['Nume','Popescu'],['Data decesului','2021-03-12'],['Preot','Pr. Nicolae Ionescu']],
    fields: [['Data înmormântării','2021-03-15'],['Locul','Cimitirul Central, București'],['Vârsta','82']]
  },
  // Church Slavonic — Church Records
  {
    flag: 'Slavonic',
    label: 'Церковныя записи',
    sub: 'Church Records (Church Slavonic)',
    title: 'Церковныя книги',
    sample: [['Имѧ','Іоанн'],['Родъ','Петровъ'],['Лѣто','Аѳіѳ'],['Священнослужитель','Пр. Феодоръ']],
    fields: [['Мѣсто','Крамъ Св. Николы'],['Примѣчаніе','—']]
  },
  // Latin — Church Records
  {
    flag: 'Vatican',
    label: 'Registra Ecclesiastica',
    sub: 'Church Records (Latin)',
    title: 'Registrum',
    sample: [['Nomen','Marcus'],['Cognomen','Valerius'],['Dies','MMXII-IX-V'],['Sacerdos','P. Ioannes']],
    fields: [['Locus','Paroecia S. Nicolai'],['Notatio','—']]
  },
  // Chinese — Church Records
  {
    flag: 'China',
    label: '教会记录',
    sub: 'Church Records (Chinese)',
    title: '教会登记',
    sample: [['姓名','王明'],['日期','2018-06-12'],['神父','若望神父'],['地点','北京']],
    fields: [['备注','—'],['证人','李华']]
  },
  // Georgian — Church Records
  {
    flag: 'Georgia',
    label: 'ეკლესიის ჩანაწერები',
    sub: 'Church Records (Georgian)',
    title: 'ეკლესიის ჩანაწერი',
    sample: [['სახელი','გიორგი'],['გვარი','პაპაშვილი'],['თარიღი','2016-02-28'],['მღვიმე','მამა იოანე']],
    fields: [['ადგილი','თბილისი, წმ. ნიკოლოზის ტაძარი'],['შენიშვნა','—']]
  }
];

const ring = document.getElementById('ring');
const N = ITEMS.length;
const radius = 560;
const step = 360 / N;

// build cards
ITEMS.forEach((it, i) => {
  const holder = document.createElement('div');
  holder.className = 'item';
  holder.style.transform = `translate3d(-50%,-50%,0) rotateY(${i*step}deg) translateZ(${radius}px)`;

  const card = document.createElement('div');
  card.className = 'card';

  // banner with flag and localized label
  const banner = document.createElement('div');
  banner.className = 'flag-banner';
  const flagDiv = document.createElement('div');
  flagDiv.innerHTML = (Flags[it.flag] ? Flags[it.flag]() : '');
  const labelWrap = document.createElement('div');
  labelWrap.className = 'flag-title';
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = it.label;
  const sub = document.createElement('div');
  sub.className = 'greek';
  sub.textContent = it.sub;
  labelWrap.appendChild(label); labelWrap.appendChild(sub);
  banner.appendChild(flagDiv); banner.appendChild(labelWrap);
  card.appendChild(banner);

  // partial sample snippet
  const snip = document.createElement('div');
  snip.className = 'snippet';
  snip.innerHTML = it.sample.map(([k,v]) => `<div><span class="k">${k}</span>: <span class="v">${v}</span></div>`).join('');
  card.appendChild(snip);

  // main body
  const inner = document.createElement('div');
  inner.innerHTML = `
    <div class="badge"></div>
    <div class="shine"></div>
    <div class="title">${it.title}</div>
    <div class="subtitle">${it.sub}</div>
    <dl class="fields">
      ${it.fields.map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}
    </dl>
  `;
  card.appendChild(inner);

  // reflection
  const refl = card.cloneNode(true);
  refl.classList.add('reflection');

  holder.appendChild(card);
  holder.appendChild(refl);
  ring.appendChild(holder);
});

// particles
const particles = document.getElementById('particles');
for(let i=0;i<110;i++){
  const d = document.createElement('div');
  d.className='dot';
  d.style.left = Math.random()*100+'%';
  d.style.bottom = Math.random()*40+'px';
  d.style.animationDuration = (8+Math.random()*14)+'s';
  d.style.animationDelay = (-Math.random()*6)+'s';
  particles.appendChild(d);
}

// controls
const toggleSpin = document.getElementById('toggleSpin');
const speed = document.getElementById('speed');
function updateSpeed(){ document.getElementById('ring').style.animationDuration = speed.value + 's'; }
speed.addEventListener('input', updateSpeed); updateSpeed();
toggleSpin.addEventListener('change', e => { document.getElementById('ring').classList.toggle('paused', !toggleSpin.checked); });

let manualAngle = 0;
function rotate(delta){
  manualAngle += delta;
  const ring = document.getElementById('ring');
  ring.style.animation = 'none';
  ring.style.transform = `translateZ(-520px) rotateY(${manualAngle}deg)`;
  if(toggleSpin.checked){
    setTimeout(()=>{ ring.style.animation='spin '+speed.value+'s linear infinite'; ring.style.transform=''; }, 60);
  }
}
document.getElementById('prev').addEventListener('click', ()=> rotate( step));
document.getElementById('next').addEventListener('click', ()=> rotate(-step));
</script>
</body>
</html>
