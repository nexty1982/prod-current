<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient for the cross -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6C90E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A80A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#F6C90E" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Orthodox Cross with 3D effect -->
  <!-- Vertical beam -->
  <rect x="36" y="0" width="8" height="80" rx="4" fill="url(#goldGradient)" filter="url(#dropShadow)"/>
  
  <!-- Top horizontal bar -->
  <rect x="20" y="15" width="40" height="6" rx="3" fill="url(#goldGradient)" filter="url(#dropShadow)"/>
  
  <!-- Main horizontal bar -->
  <rect x="15" y="35" width="50" height="8" rx="4" fill="url(#goldGradient)" filter="url(#dropShadow)"/>
  
  <!-- Bottom angled bar -->
  <rect x="25" y="55" width="30" height="6" rx="3" fill="url(#goldGradient)" filter="url(#dropShadow)" transform="rotate(-20 40 58)"/>
  
  <!-- 3D highlights -->
  <rect x="36" y="0" width="4" height="80" rx="2" fill="#FFE55C" opacity="0.6"/>
  <rect x="20" y="15" width="20" height="3" rx="1.5" fill="#FFE55C" opacity="0.6"/>
  <rect x="15" y="35" width="25" height="4" rx="2" fill="#FFE55C" opacity="0.6"/>
</svg>
