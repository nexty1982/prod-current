# Nginx Configuration Snippet for OM-Ops Hub
# Add this to your site config (e.g., /etc/nginx/sites-available/orthodoxmetrics.com)

# Internal auth check endpoint (used by auth_request)
location = /_admin_auth_check {
    internal;
    proxy_pass http://127.0.0.1:3001/api/admin/auth/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
}

# OM-Ops Hub (protected by auth_request)
location /admin/ops/ {
    auth_request /_admin_auth_check;
    
    # Proxy to sidecar service
    proxy_pass http://127.0.0.1:3010/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    
    # WebSocket support (if needed)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
